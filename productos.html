<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Productos</title>

<style>
body {
    font-family: 'Segoe UI';
    margin: 0;
    background: #f5f5f5;
}

/* HEADER */
header {
    background: #1e1e1e;
    color: white;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
}

nav a:hover {
    color: #ff9800;
}

/* CONTENEDOR */
.productos {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 40px;
}

/* TARJETAS */
.card {
    background: white;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    width: 250px;
    text-align: center;
    overflow: hidden;
    transition: transform 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.card h3 {
    margin: 10px 0;
}

/* BOTÓN */
.btn {
    background: #ff9800;
    border: none;
    padding: 10px;
    color: white;
    width: 100%;
    cursor: pointer;
}

.btn:hover {
    background: #e68900;
}

/* FOOTER */
footer {
    background: #1e1e1e;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>
</head>

<body>

<header>
    <h2>Tienda Café ☕</h2>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="productos.html">Productos</a>
        <a href="compras.html">Compras</a>
        <a href="acercade.html">Acerca de</a>
        <a href="contacto.html">Contacto</a>
    </nav>
</header>

<section class="productos">


<div class="card">
<img src="https://cdn.pixabay.com/photo/2016/11/29/12/54/coffee-1869656_1280.jpg">
<h3>Café Premium</h3>
<p>$20.000</p>
<button class="btn" onclick="agregarAlCarrito('Café Premium', 20000)">Agregar</button>
</div>


<div class="card">
<img src="https://cdn.pixabay.com/photo/2015/05/07/13/46/cappuccino-756490_1280.jpg">
<h3>Café Orgánico</h3>
<p>$18.000</p>
<button class="btn" onclick="agregarAlCarrito('Café Orgánico', 18000)">Agregar</button>
</div>


<div class="card">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS1aTw4r_djXYjlvbNQj43zqifXphSl5J1BNg&s">
<h3>Café Especial</h3>
<p>$25.000</p>
<button class="btn" onclick="agregarAlCarrito('Café Especial', 25000)">Agregar</button>
</div>


<div class="card">
<img src="https://www.nescafe.com/co/sites/default/files/2024-06/cafe-tostado-y-molido_desktop.jpg">
<h3>Café Molido</h3>
<p>$15.000</p>
<button class="btn" onclick="agregarAlCarrito('Café Molido', 15000)">Agregar</button>
</div>


<div class="card">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQkLigpY3W3cc2ODakgwkibHLV6dbv1DFOFyg&s">
<h3>Café en grano</h3>
<p>$20.000</p>
<button class="btn" onclick="agregarAlCarrito('Café en grano', 20000)">Agregar</button>
</div>

</section>

<footer>
<p>© 2026 Tienda de Café</p>
</footer>

<script src="carrito.js"></script>

</body>
</html>
