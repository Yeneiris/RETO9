<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contacto</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f5f5;
}

/* HEADER */
header {
    background: #1e1e1e;
    color: white;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
}

nav a:hover {
    color: #ff9800;
}

/* HERO */
.hero {
    background: linear-gradient(to right, #3e2723, #795548);
    color: white;
    text-align: center;
    padding: 50px;
}

/* CONTENEDOR */
.contenedor {
    display: flex;
    justify-content: center;
    padding: 40px;
}

/* CARD */
.card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    width: 380px;
    text-align: center;
}

/* INPUTS */
input, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
}

/* BOTÓN */
button {
    width: 100%;
    padding: 12px;
    background: #ff9800;
    border: none;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #e68900;
}

/* INFO EXTRA */
.info {
    margin-top: 20px;
    font-size: 14px;
    color: #555;
}

/* MAPA */
.mapa {
    margin-top: 20px;
}

iframe {
    width: 100%;
    height: 250px;
    border: 0;
    border-radius: 10px;
}

/* FOOTER */
footer {
    background: #1e1e1e;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>

</head>

<body>

<header>
<h2>Tienda Café ☕</h2>
<nav>
<a href="index.html">Inicio</a>
<a href="productos.html">Productos</a>
<a href="compras.html">Compras</a>
<a href="acercade.html">Acerca de</a>
<a href="contacto.html">Contacto</a>
</nav>
</header>

<section class="hero">
<h1>Contáctanos</h1>
<p>Estamos aquí para ayudarte ☕</p>
</section>

<div class="contenedor">

<div class="card">

<img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png" width="80">

<form>
<input type="text" placeholder="Nombre" required>
<input type="email" placeholder="Correo" required>
<textarea rows="4" placeholder="Escribe tu mensaje..." required></textarea>
<button type="submit">Enviar mensaje</button>
</form>

<div class="info">
<p>📧 correo@tiendacafe.com</p>
<p>📞 +57 300 000 0000</p>
<p>📍 Colombia</p>
</div>


<div class="mapa">
<iframe 
src="https://www.google.com/maps?q=Colombia&output=embed"
loading="lazy">
</iframe>
</div>

</div>

</div>

<footer>
<p>© 2026 Tienda de Café</p>
</footer>

</body>
</html>
